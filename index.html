<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nœuds Cristallins Oscillants</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #f0f0f0, #e6e6e6, #ffffff);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            transition: background 0.5s ease;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #energy-display {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #00ff88;
            padding: 15px 25px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border: 2px solid rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
            min-width: 400px;
            text-align: center;
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        
        .project-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            letter-spacing: 3px;
            opacity: 0.8;
        }
        
        .energy-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            align-items: center;
            min-height: 20px;
        }
        
        .energy-label {
            color: #88ffaa;
            font-weight: bold;
        }
        
        .energy-value {
            color: #00ff88;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 136, 0.5);
        }
        
        .crystal-token {
            color: #ffaa00;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 170, 0, 0.5);
        }
        

        
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
        }

        /* Media Queries pour Mobile et Responsive */
        @media (max-width: 768px) {
            #energy-display {
                bottom: 10px;
                left: 10px;
                right: 10px;
                transform: none;
                min-width: auto;
                width: calc(100% - 20px);
                padding: 12px 15px;
                font-size: 12px;
                box-sizing: border-box;
            }
            
            .project-title {
                font-size: 16px;
                letter-spacing: 2px;
                margin-bottom: 10px;
            }
            
            .energy-row {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
                margin: 6px 0;
                gap: 5px;
                flex-wrap: wrap;
            }
            
            .energy-label {
                font-size: 10px;
                flex: 1;
                min-width: 140px;
            }
            
            .energy-value, .crystal-token {
                font-size: 11px;
                text-align: right;
                flex-shrink: 0;
            }
            
            #info {
                display: none; /* Masquer sur mobile pour éviter le chevauchement */
            }
        }

        @media (max-width: 480px) {
            #energy-display {
                bottom: 8px;
                left: 8px;
                right: 8px;
                width: calc(100% - 16px);
                padding: 10px 12px;
                font-size: 11px;
            }
            
            .project-title {
                font-size: 14px;
                letter-spacing: 1px;
                margin-bottom: 8px;
            }
            
            .energy-row {
                margin: 5px 0;
                flex-direction: column;
                text-align: center;
                gap: 2px;
            }
            
            .energy-label {
                font-size: 9px;
                font-weight: bold;
            }
            
            .energy-value, .crystal-token {
                font-size: 12px;
                text-align: center;
            }
        }

        @media (max-width: 360px) {
            #energy-display {
                bottom: 5px;
                left: 5px;
                right: 5px;
                width: calc(100% - 10px);
                padding: 8px 10px;
                font-size: 10px;
            }
            
            .project-title {
                font-size: 13px;
                letter-spacing: 1px;
                margin-bottom: 6px;
            }
            
            .energy-row {
                margin: 4px 0;
                flex-direction: column;
                text-align: center;
                gap: 1px;
            }
            
            .energy-label {
                font-size: 8px;
            }
            
            .energy-value, .crystal-token {
                font-size: 11px;
            }
        }

        @media (max-height: 600px) {
            #energy-display {
                bottom: 5px;
                padding: 8px 15px;
                font-size: 11px;
            }
            
            .project-title {
                font-size: 14px;
                margin-bottom: 5px;
            }
            
            .energy-row {
                margin: 3px 0;
            }
        }

        /* Orientation paysage sur mobile */
        @media (max-width: 768px) and (orientation: landscape) {
            #energy-display {
                bottom: 5px;
                left: 5px;
                width: 320px;
                transform: none;
                font-size: 10px;
                padding: 6px 10px;
                right: auto;
            }
            
            .project-title {
                font-size: 12px;
                margin-bottom: 4px;
            }
            
            .energy-row {
                margin: 2px 0;
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
            
            .energy-label {
                font-size: 8px;
                flex: 1;
            }
            
            .energy-value, .crystal-token {
                font-size: 9px;
                text-align: right;
            }
        }

        /* Écrans très larges */
        @media (min-width: 1200px) {
            #energy-display {
                min-width: 450px;
                font-size: 15px;
                padding: 18px 30px;
            }
            
            .project-title {
                font-size: 20px;
                letter-spacing: 4px;
            }
            
            .energy-label {
                font-size: 14px;
            }
            
            .energy-value, .crystal-token {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="energy-display">
            <div class="project-title">S I R I U S</div>
            <div class="energy-row">
                <span class="energy-label">CRYSTAL TOKEN FREQUENCY:</span>
                <span class="energy-value"><span id="token-frequency">0.00</span> Hz</span>
            </div>
            <div class="energy-row">
                <span class="energy-label">CUMULATIVE TOKEN FREQUENCY:</span>
                <span class="energy-value"><span id="cumulative-frequency">0.00</span> Hz</span>
            </div>
            <div class="energy-row">
                <span class="energy-label">ELECTRICITY GENERATED:</span>
                <span class="energy-value"><span id="energy-generated">0.000</span> kWh</span>
            </div>
            <div class="energy-row">
                <span class="energy-label">CURRENT VALUE:</span>
                <span class="crystal-token">$<span id="energy-value">0.000</span> USD</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Détection mobile et ajustements de performance
        const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isTablet = window.innerWidth <= 1024 && window.innerWidth > 768;
        
        // Ajustements pour mobile
        if (isMobile) {
            // Réduire le nombre de nœuds pour les performances
            var mobileOptimizations = {
                reducedNodes: true,
                lowerQuality: true,
                reducedAnimations: true
            };
        }

        // Variables globales
        let scene, camera, renderer, nodes = [], connections = [];
        let baseFrequency = 0.5, sphereRadius = 8;
        let time = 0;
        let structures = ['concentric', 'fibonacci', 'icosahedral', 'random_sphere'];
        let currentStructure = 0;
        let showConnections = true;
        let structureChangeTimer = 0;
        let lastStructureChange = 0;
        
        // Système de fréquences évolutives
        let harmonicFrequencies = [1.0]; // Pool des fréquences harmoniques accumulées
        let maxFrequency = 5.0; // Fréquence maximale avant addition
        let evolutionRate = 0.01; // Vitesse d'évolution des fréquences
        
        // Système énergétique
        let totalEnergyGenerated = 0; // kWh cumulés
        let electricityPrice = 0.12; // USD par kWh (prix global moyen)
        let lastEnergyUpdate = 0;
        
        // Couleurs pour les nœuds
        const nodeColors = [
            0x64b5f6, // Bleu clair
            0x81c784, // Vert clair
            0xffb74d, // Orange
            0xf06292, // Rose
            0xba68c8, // Violet
            0x4db6ac  // Teal
        ];

        // Initialisation
        function init() {
            // Scène
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a2e, 10, 50);
            
            // Caméra
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 15, 15);
            camera.lookAt(0, 0, 0);
            
            // Renderer avec ajustements mobiles
            renderer = new THREE.WebGLRenderer({ 
                antialias: !isMobile, // Désactiver l'antialiasing sur mobile
                alpha: true,
                powerPreference: isMobile ? "low-power" : "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            
            // Ajustements de qualité pour mobile
            if (isMobile) {
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limiter la densité de pixels
            } else {
                renderer.setPixelRatio(window.devicePixelRatio);
            }
            document.getElementById('container').appendChild(renderer.domElement);
            
            // Lumières
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0x64b5f6, 0.5, 30);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);
            
            // Contrôles souris supprimés pour autonomie complète
            
            // Création de la structure cristalline
            createCrystalStructure();
            
            // Initialisation du système énergétique
            lastEnergyUpdate = 0;
            totalEnergyGenerated = 0;
            
            // Event listener pour le redimensionnement avec gestion mobile
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                
                // Ajuster le pixel ratio sur mobile lors du redimensionnement
                if (isMobile) {
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                }
            });
            
            // Gestion de l'orientation sur mobile
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }, 100);
            });
            
            // Animation
            animate();
        }
        
        function createCrystalStructure() {
            // Nettoyage
            clearNodes();
            
            switch(structures[currentStructure]) {
                case 'concentric':
                    createConcentricSpheres();
                    break;
                case 'fibonacci':
                    createFibonacciSphere();
                    break;
                case 'icosahedral':
                    createIcosahedralSphere();
                    break;
                case 'random_sphere':
                    createRandomSphereStructure();
                    break;
            }
            
            if (showConnections) {
                createConnections();
            }
            
            updateInfo();
        }
        
        function createConcentricSpheres() {
            const layers = isMobile ? 3 : 5; // Moins de couches sur mobile
            for (let layer = 0; layer < layers; layer++) {
                const radius = (layer + 1) * (sphereRadius / layers);
                const nodesInLayer = isMobile ? Math.max(4, layer * 6) : Math.max(8, layer * 12); // Moins de nœuds sur mobile
                
                for (let i = 0; i < nodesInLayer; i++) {
                    // Distribution uniforme sur la sphère (méthode de Marsaglia)
                    const u = Math.random();
                    const v = Math.random();
                    const theta = 2 * Math.PI * u; // angle azimuthal
                    const phi = Math.acos(2 * v - 1); // angle polaire
                    
                    const x = radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.sin(phi) * Math.sin(theta);
                    const z = radius * Math.cos(phi);
                    
                    createNode(x, y, z, layer);
                }
            }
        }
        
        function createFibonacciSphere() {
            const numPoints = isMobile ? 100 : 200; // Moins de points sur mobile
            const goldenRatio = (1 + Math.sqrt(5)) / 2;
            
            for (let i = 0; i < numPoints; i++) {
                const y = 1 - (i / (numPoints - 1)) * 2; // de -1 à 1
                const radiusAtY = Math.sqrt(1 - y * y);
                
                const theta = 2 * Math.PI * i / goldenRatio;
                
                const x = Math.cos(theta) * radiusAtY * sphereRadius;
                const z = Math.sin(theta) * radiusAtY * sphereRadius;
                const yPos = y * sphereRadius;
                
                createNode(x, yPos, z, Math.floor(i / (isMobile ? 20 : 40)));
            }
        }
        
        function createIcosahedralSphere() {
            // Création d'un icosaèdre géodésique
            const t = (1 + Math.sqrt(5)) / 2; // nombre d'or
            const scale = sphereRadius / Math.sqrt(1 + t * t);
            
            // 12 sommets de l'icosaèdre
            const vertices = [
                [-1, t, 0], [1, t, 0], [-1, -t, 0], [1, -t, 0],
                [0, -1, t], [0, 1, t], [0, -1, -t], [0, 1, -t],
                [t, 0, -1], [t, 0, 1], [-t, 0, -1], [-t, 0, 1]
            ];
            
            // Ajouter les sommets
            vertices.forEach((vertex, index) => {
                createNode(
                    vertex[0] * scale,
                    vertex[1] * scale,
                    vertex[2] * scale,
                    index % 6
                );
            });
            
            // Ajouter des points intermédiaires pour densifier
            for (let subdivision = 1; subdivision <= 3; subdivision++) {
                const subdivisionRadius = sphereRadius * (1 - subdivision * 0.2);
                const pointsPerLayer = 20 * subdivision;
                
                for (let i = 0; i < pointsPerLayer; i++) {
                    const u = i / pointsPerLayer;
                    const v = (i * 0.618034) % 1; // ratio doré pour distribution uniforme
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);
                    
                    const x = subdivisionRadius * Math.sin(phi) * Math.cos(theta);
                    const y = subdivisionRadius * Math.sin(phi) * Math.sin(theta);
                    const z = subdivisionRadius * Math.cos(phi);
                    
                    createNode(x, y, z, subdivision);
                }
            }
        }
        
        function createRandomSphereStructure() {
            const numNodes = isMobile ? 75 : 150; // Moins de nœuds sur mobile
            
            for (let i = 0; i < numNodes; i++) {
                // Distribution aléatoire dans une sphère avec densité variable
                const u = Math.random();
                const radius = sphereRadius * Math.pow(u, 1/3); // Distribution volumique uniforme
                
                const v1 = Math.random();
                const v2 = Math.random();
                const theta = 2 * Math.PI * v1;
                const phi = Math.acos(2 * v2 - 1);
                
                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);
                
                createNode(x, y, z, Math.floor(radius / (sphereRadius / 6)));
            }
        }
        
        function createNode(x, y, z, colorIndex) {
            // Géométrie avec moins de détails sur mobile
            const geometry = new THREE.SphereGeometry(0.15, isMobile ? 8 : 12, isMobile ? 8 : 12);
            const material = new THREE.MeshPhongMaterial({
                color: nodeColors[colorIndex % nodeColors.length],
                shininess: isMobile ? 50 : 100, // Moins de brillance sur mobile
                transparent: true,
                opacity: 0.9
            });
            
            const node = new THREE.Mesh(geometry, material);
            node.position.set(x, y, z);
            node.userData = {
                originalPosition: { x, y, z },
                phase: Math.random() * Math.PI * 2,
                colorIndex: colorIndex % nodeColors.length,
                // Propriétés de résonance évolutive
                currentFrequency: baseFrequency + Math.random() * 0.5, // Fréquence individuelle
                personalHarmonics: [], // Harmoniques personnelles accumulées
                resonanceIntensity: 0.5 + Math.random() * 0.5, // Intensité de résonance
                evolutionPhase: Math.random() * Math.PI * 2 // Phase d'évolution
            };
            
            scene.add(node);
            nodes.push(node);
        }
        
        function createConnections() {
            clearConnections();
            
            const maxDistance = sphereRadius * 0.4; // Distance adaptée à la taille de la sphère
            
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const distance = nodes[i].position.distanceTo(nodes[j].position);
                    
                    if (distance < maxDistance) {
                        const geometry = new THREE.BufferGeometry();
                        const positions = new Float32Array([
                            nodes[i].position.x, nodes[i].position.y, nodes[i].position.z,
                            nodes[j].position.x, nodes[j].position.y, nodes[j].position.z
                        ]);
                        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                        
                        const material = new THREE.LineBasicMaterial({
                            color: 0x4fc3f7,
                            transparent: true,
                            opacity: 0.3
                        });
                        
                        const line = new THREE.Line(geometry, material);
                        line.userData = { nodeA: i, nodeB: j };
                        scene.add(line);
                        connections.push(line);
                    }
                }
            }
        }
        
        function clearNodes() {
            nodes.forEach(node => scene.remove(node));
            nodes = [];
            clearConnections();
        }
        
        function clearConnections() {
            connections.forEach(connection => scene.remove(connection));
            connections = [];
        }
        
        function updateEnergyDisplay() {
            // Calcul de la fréquence du token cristal (moyenne pondérée des harmoniques)
            let tokenFrequency = baseFrequency;
            let totalWeight = 1;
            
            harmonicFrequencies.forEach((freq, index) => {
                const weight = 1 / (index + 1); // Poids décroissant
                tokenFrequency += freq * weight;
                totalWeight += weight;
            });
            tokenFrequency = tokenFrequency / totalWeight;
            
            // Calcul de la fréquence cumulée (somme de toutes les harmoniques + base)
            let cumulativeFrequency = baseFrequency;
            harmonicFrequencies.forEach(freq => {
                cumulativeFrequency += freq;
            });
            
            // Calcul de l'énergie générée (basé sur la fréquence et le temps écoulé)
            const energyGenerationRate = tokenFrequency / 10; // kW
            const deltaTime = time - lastEnergyUpdate;
            const energyIncrement = energyGenerationRate * (deltaTime / 3600); // Conversion en kWh
            totalEnergyGenerated += energyIncrement;
            lastEnergyUpdate = time;
            
            // Calcul de la valeur en USD
            const currentValue = totalEnergyGenerated * electricityPrice;
            
            // Mise à jour de l'affichage
            document.getElementById('token-frequency').textContent = tokenFrequency.toFixed(3);
            document.getElementById('cumulative-frequency').textContent = cumulativeFrequency.toFixed(3);
            document.getElementById('energy-generated').textContent = totalEnergyGenerated.toFixed(6);
            document.getElementById('energy-value').textContent = currentValue.toFixed(6);
            
            // Variation du prix de l'électricité pour simulation réaliste
            electricityPrice = 0.12 + Math.sin(time * 0.001) * 0.03; // Fluctue entre 0.09 et 0.15 USD/kWh
        }
        
        function updateInfo() {
            // Fonction conservée pour compatibilité mais sans affichage
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.02;
            
            // Évolution des fréquences harmoniques globales
            baseFrequency += evolutionRate * 0.1;
            if (baseFrequency > maxFrequency) {
                // Quand la fréquence de base atteint le maximum, l'ajouter aux harmoniques
                harmonicFrequencies.push(baseFrequency);
                baseFrequency = 0.5; // Reset à la fréquence de base
                
                // Limiter le nombre d'harmoniques pour éviter la surcharge
                if (harmonicFrequencies.length > 10) {
                    harmonicFrequencies.shift(); // Supprimer la plus ancienne
                }
            }
            
            // Changement automatique de structure toutes les 25 secondes (plus lent pour observer l'évolution)
            if (time - lastStructureChange > 25) {
                currentStructure = (currentStructure + 1) % structures.length;
                createCrystalStructure();
                lastStructureChange = time;
            }
            
            // Changement automatique de taille de sphère toutes les 40 secondes
            const newRadius = Math.floor(time / 40) % 2 === 0 ? 8 : 6;
            if (newRadius !== sphereRadius) {
                sphereRadius = newRadius;
                createCrystalStructure();
            }
            
            // Basculement automatique des connexions toutes les 30 secondes
            const shouldShowConnections = Math.floor(time / 30) % 2 === 0;
            if (shouldShowConnections !== showConnections) {
                showConnections = shouldShowConnections;
                if (showConnections) {
                    createConnections();
                } else {
                    clearConnections();
                }
            }
            
            // Animation évolutive des nœuds avec résonance harmonique
            nodes.forEach((node, index) => {
                const originalPos = node.userData.originalPosition;
                const userData = node.userData;
                
                // Évolution de la fréquence personnelle du nœud
                userData.currentFrequency += evolutionRate * userData.resonanceIntensity;
                
                // Si la fréquence personnelle atteint le maximum, l'ajouter aux harmoniques personnelles
                if (userData.currentFrequency > maxFrequency) {
                    userData.personalHarmonics.push(userData.currentFrequency);
                    userData.currentFrequency = baseFrequency + Math.random() * 0.3; // Reset avec variation
                    
                    // Limiter les harmoniques personnelles
                    if (userData.personalHarmonics.length > 5) {
                        userData.personalHarmonics.shift();
                    }
                }
                
                // Calcul des oscillations avec toutes les fréquences harmoniques
                let totalOscillationX = 0;
                let totalOscillationY = 0;
                let totalOscillationZ = 0;
                let totalAmplitude = 0;
                
                // Contribution de la fréquence personnelle
                const personalPhase = userData.phase + userData.evolutionPhase;
                totalOscillationX += Math.sin(time * userData.currentFrequency + personalPhase) * 0.3;
                totalOscillationY += Math.sin(time * userData.currentFrequency * 1.2 + personalPhase + Math.PI/4) * 0.4;
                totalOscillationZ += Math.cos(time * userData.currentFrequency * 0.8 + personalPhase) * 0.3;
                totalAmplitude += userData.currentFrequency * 0.1;
                
                // Contribution des harmoniques globales
                harmonicFrequencies.forEach((freq, harmonicIndex) => {
                    const harmonicPhase = personalPhase + harmonicIndex * Math.PI / 4;
                    const harmonicWeight = 1 / (harmonicIndex + 1); // Poids décroissant pour les harmoniques plus anciennes
                    
                    totalOscillationX += Math.sin(time * freq + harmonicPhase) * 0.2 * harmonicWeight;
                    totalOscillationY += Math.sin(time * freq * 1.3 + harmonicPhase + Math.PI/6) * 0.3 * harmonicWeight;
                    totalOscillationZ += Math.cos(time * freq * 0.9 + harmonicPhase) * 0.2 * harmonicWeight;
                    totalAmplitude += freq * 0.05 * harmonicWeight;
                });
                
                // Contribution des harmoniques personnelles
                userData.personalHarmonics.forEach((freq, harmonicIndex) => {
                    const personalHarmonicPhase = personalPhase + harmonicIndex * Math.PI / 3;
                    const personalWeight = userData.resonanceIntensity / (harmonicIndex + 1);
                    
                    totalOscillationX += Math.sin(time * freq + personalHarmonicPhase) * 0.25 * personalWeight;
                    totalOscillationY += Math.sin(time * freq * 1.4 + personalHarmonicPhase + Math.PI/5) * 0.35 * personalWeight;
                    totalOscillationZ += Math.cos(time * freq * 0.7 + personalHarmonicPhase) * 0.25 * personalWeight;
                    totalAmplitude += freq * 0.08 * personalWeight;
                });
                
                // Calcul de la position en coordonnées sphériques évolutives
                const originalRadius = Math.sqrt(originalPos.x * originalPos.x + originalPos.y * originalPos.y + originalPos.z * originalPos.z);
                const originalTheta = Math.atan2(originalPos.z, originalPos.x);
                const originalPhi = Math.acos(originalPos.y / (originalRadius || 1));
                
                // Oscillations radiales complexes
                const radialOscillation = totalOscillationY * Math.min(2.0, totalAmplitude);
                const newRadius = Math.max(0.1, originalRadius + radialOscillation);
                
                // Oscillations angulaires complexes
                const thetaOscillation = totalOscillationX * 0.3;
                const phiOscillation = totalOscillationZ * 0.3;
                
                const newTheta = originalTheta + thetaOscillation;
                const newPhi = Math.max(0.1, Math.min(Math.PI - 0.1, originalPhi + phiOscillation));
                
                // Rotation globale lente évolutive
                const globalRotation = time * 0.03 * (1 + totalAmplitude * 0.1);
                const finalTheta = newTheta + globalRotation;
                
                // Conversion vers coordonnées cartésiennes
                const x = newRadius * Math.sin(newPhi) * Math.cos(finalTheta);
                const y = newRadius * Math.cos(newPhi);
                const z = newRadius * Math.sin(newPhi) * Math.sin(finalTheta);
                
                node.position.set(x, y, z);
                
                // Changement de couleur basé sur l'activité harmonique
                const harmonicActivity = (harmonicFrequencies.length + userData.personalHarmonics.length) / 15;
                const colorIntensity = 0.3 + 0.7 * Math.sin(time * 2 + personalPhase) * harmonicActivity;
                const evolutionGlow = Math.min(1.0, totalAmplitude * 0.5);
                
                node.material.emissive.setHex(nodeColors[userData.colorIndex]);
                node.material.emissive.multiplyScalar(colorIntensity * evolutionGlow);
                
                // Faire pulser la taille en fonction de l'activité harmonique
                const scaleFactor = 1 + totalAmplitude * 0.1 * Math.sin(time * userData.currentFrequency + personalPhase);
                node.scale.setScalar(scaleFactor);
            });
            
            // Mise à jour des connexions si elles existent
            if (connections.length > 0) {
                connections.forEach(connection => {
                    if (connection.userData.nodeA < nodes.length && connection.userData.nodeB < nodes.length) {
                        const nodeA = nodes[connection.userData.nodeA];
                        const nodeB = nodes[connection.userData.nodeB];
                        
                        const positions = connection.geometry.attributes.position.array;
                        positions[0] = nodeA.position.x;
                        positions[1] = nodeA.position.y;
                        positions[2] = nodeA.position.z;
                        positions[3] = nodeB.position.x;
                        positions[4] = nodeB.position.y;
                        positions[5] = nodeB.position.z;
                        
                        connection.geometry.attributes.position.needsUpdate = true;
                        
                        // Variation de l'opacité basée sur l'activité harmonique
                        const harmonicIntensity = harmonicFrequencies.length / 10;
                        connection.material.opacity = 0.1 + 0.4 * Math.sin(time * 0.5) * harmonicIntensity;
                    }
                });
            }
            
            // Rotation automatique de la caméra influencée par l'activité harmonique
            const harmonicInfluence = 1 + harmonicFrequencies.length * 0.05;
            const cameraDistance = 25 + 8 * Math.sin(time * 0.03 * harmonicInfluence);
            camera.position.x = cameraDistance * Math.cos(time * 0.08 * harmonicInfluence);
            camera.position.z = cameraDistance * Math.sin(time * 0.08 * harmonicInfluence);
            camera.position.y = 10 + 8 * Math.sin(time * 0.05 * harmonicInfluence);
            camera.lookAt(0, 0, 0);
            
            // Changement de couleur du background en temps réel basé sur l'évolution harmonique
            const harmonicIntensity = harmonicFrequencies.length / 10; // Normalisation
            const timeWave = Math.sin(time * 0.1) * 0.5 + 0.5; // Vague temporelle 0-1
            const frequencyWave = Math.sin(baseFrequency * time * 0.05) * 0.5 + 0.5;
            
            // Couleurs de base quartz avec variations
            const baseR = 240 + Math.sin(time * 0.02) * 15; // 240±15
            const baseG = 240 + Math.cos(time * 0.03) * 20; // 240±20  
            const baseB = 245 + Math.sin(time * 0.025) * 10; // 245±10
            
            // Variations harmoniques - couleurs plus prononcées quand plus d'harmoniques
            const harmonicR = Math.sin(time * 0.05 + harmonicIntensity) * 30 * harmonicIntensity;
            const harmonicG = Math.cos(time * 0.04 + harmonicIntensity * 2) * 40 * harmonicIntensity;
            const harmonicB = Math.sin(time * 0.06 + harmonicIntensity * 3) * 50 * harmonicIntensity;
            
            // Couleurs finales avec variations fréquentielles
            const color1R = Math.max(0, Math.min(255, baseR + harmonicR + frequencyWave * 20));
            const color1G = Math.max(0, Math.min(255, baseG + harmonicG + timeWave * 15));
            const color1B = Math.max(0, Math.min(255, baseB + harmonicB + frequencyWave * 25));
            
            const color2R = Math.max(0, Math.min(255, baseR - harmonicR * 0.5 + timeWave * 10));
            const color2G = Math.max(0, Math.min(255, baseG - harmonicG * 0.3 + harmonicIntensity * 20));
            const color2B = Math.max(0, Math.min(255, baseB - harmonicB * 0.7 + frequencyWave * 15));
            
            const color3R = Math.max(0, Math.min(255, baseR + Math.sin(time * 0.08) * 25 * harmonicIntensity));
            const color3G = Math.max(0, Math.min(255, baseG + Math.cos(time * 0.07) * 30 * harmonicIntensity));
            const color3B = Math.max(0, Math.min(255, baseB + Math.sin(time * 0.09) * 35 * harmonicIntensity));
            
            // Application du gradient évolutif
            const gradient = `linear-gradient(${45 + Math.sin(time * 0.02) * 30}deg, 
                rgb(${Math.floor(color1R)}, ${Math.floor(color1G)}, ${Math.floor(color1B)}), 
                rgb(${Math.floor(color2R)}, ${Math.floor(color2G)}, ${Math.floor(color2B)}), 
                rgb(${Math.floor(color3R)}, ${Math.floor(color3G)}, ${Math.floor(color3B)}))`;
            
            document.body.style.background = gradient;
            
            // Mise à jour de l'affichage énergétique en temps réel
            updateEnergyDisplay();
            
            // Mise à jour des informations en temps réel
            updateInfo();
            
            renderer.render(scene, camera);
        }
        
        // Démarrage
        init();
    </script>
</body>
